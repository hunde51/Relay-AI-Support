version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relayai
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://relay:relay@postgres:5432/relayai
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=please-change-me
    depends_on:
      - postgres
      - redis
      - qdrant

  frontend:
    build: ./frontend
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  db_data:
